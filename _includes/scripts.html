<script src="assets/js/main.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var navLinks = document.querySelectorAll(".masthead a[href^='#']");
    var sectionIds = Array.prototype.map.call(navLinks, function (link) {
      return link.getAttribute("href");
    });

    function setActiveNav(hash) {
      navLinks.forEach(function (link) {
        if (link.getAttribute("href") === hash) {
          link.classList.add("is-active");
        } else {
          link.classList.remove("is-active");
        }
      });
    }

    navLinks.forEach(function (link) {
      link.addEventListener("click", function (event) {
        var hash = link.getAttribute("href");
        var target = document.querySelector(hash);

        if (!target) {
          return;
        }

        event.preventDefault();

        var masthead = document.querySelector(".masthead");
        var offset = masthead ? masthead.offsetHeight + 14 : 20;
        var targetTop = target.getBoundingClientRect().top + window.pageYOffset - offset;

        setActiveNav(hash);

        window.scrollTo({
          top: targetTop,
          behavior: "smooth"
        });

        if (history.pushState) {
          history.pushState(null, "", hash);
        } else {
          window.location.hash = hash;
        }
      });
    });

    function updateActiveNavOnScroll() {
      var masthead = document.querySelector(".masthead");
      var offset = masthead ? masthead.offsetHeight + 28 : 36;
      var activeHash = sectionIds[0];

      sectionIds.forEach(function (hash) {
        var section = document.querySelector(hash);

        if (!section) {
          return;
        }

        if (section.getBoundingClientRect().top - offset <= 0) {
          activeHash = hash;
        }
      });

      if (activeHash) {
        setActiveNav(activeHash);
      }
    }

    window.addEventListener("scroll", updateActiveNavOnScroll, { passive: true });
    updateActiveNavOnScroll();

    var links = document.querySelectorAll("a[href]");

    links.forEach(function (link) {
      var href = link.getAttribute("href");

      if (
        !href ||
        href.indexOf("#") === 0 ||
        href.indexOf("mailto:") === 0 ||
        href.indexOf("tel:") === 0
      ) {
        return;
      }

      try {
        var url = new URL(link.href, window.location.href);

        if (url.protocol === "http:" || url.protocol === "https:") {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer");
        }
      } catch (error) {
        return;
      }
    });
  });
</script>
